name: Grade — Atividade 4 (Maestro Suite)

# CI ubuntu-latest gratuito não tem KVM, então emulator x86_64 não boota.
# Auto-grade aqui valida apenas estrutura + sintaxe (parse-only via maestro check).
# Critério "execução real" no rubrica é validado pelo prof manualmente via:
#   - vídeo de execução submetido pelo aluno (link em PR description)
#   - log do `maestro test` rodado local pelo aluno
# Para CI com execução real em Android emulator, seria necessário:
#   - macOS runner (caro)
#   - Maestro Cloud (pago)
#   - Self-hosted runner com KVM
# Mantemos parse-only nesta fase por custo/simplicidade.

on:
  pull_request_target:  # PRs de forks rodam sem aprovação manual
    paths:
      - 'exercicios/04-suite-maestro-cross-platform/aluno-*/**'

permissions:
  pull-requests: write
  contents: read

jobs:
  grade:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install grader deps
        working-directory: ./grader
        run: npm ci || npm install

      - name: Discover entrega path
        id: discover
        run: |
          MATRICULA=$(echo "${{ github.event.pull_request.user.login }}" | tr '[:upper:]' '[:lower:]')
          ENTREGA="exercicios/04-suite-maestro-cross-platform/aluno-${MATRICULA}"
          echo "matricula=${MATRICULA}" >> $GITHUB_OUTPUT
          echo "entrega=${ENTREGA}" >> $GITHUB_OUTPUT
          if [ ! -d "${ENTREGA}" ]; then
            echo "::error ::Entrega não encontrada em ${ENTREGA}. Verifique convenção de path: exercicios/04-suite-maestro-cross-platform/aluno-<seu-github-username>/"
            exit 1
          fi
          echo "Entrega encontrada: ${ENTREGA}"

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Verify Maestro
        run: maestro --version

      - name: Run validator (parse-only — sem execução real)
        working-directory: ./grader
        run: |
          npx tsx lib/validators/maestro-suite.ts \
            --entrega "../${{ steps.discover.outputs.entrega }}" \
            --output /tmp/grade.json \
            --student-login "${{ steps.discover.outputs.matricula }}" \
            --commit-sha "${{ github.event.pull_request.head.sha }}" \
            --no-run || true
          echo "--- grade.json ---"
          cat /tmp/grade.json | head -100

      - name: Upload grade.json artifact (acesso só pelo prof)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grade-${{ steps.discover.outputs.matricula }}
          path: /tmp/grade.json
          retention-days: 30
          if-no-files-found: warn

      - name: Post PR comment (LGPD-safe — sem nota explícita)
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = '/tmp/grade.json';
            if (!fs.existsSync(path)) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## 🤖 J.A.R.V.I.S. — *autograder do Prof. Jackson*\n\n` +
                  `> *Just A Rather Very Intelligent System* — bot que executa as regras de avaliação automatizada do prof nos PRs de exercício.\n\n` +
                  `**Atividade 4 (Maestro Suite)**\n\n` +
                  `❌ **Não consegui avaliar sua entrega.** Verifique:\n` +
                  `- Path: \`exercicios/04-suite-maestro-cross-platform/aluno-<seu-github-username>/\`\n` +
                  `- Estrutura: \`<entrega>/flows/*.yaml\` + \`<entrega>/README.md\``,
              });
              return;
            }
            const grade = JSON.parse(fs.readFileSync(path, 'utf8'));
            const passou = grade.pass;
            // LGPD: comment público mostra apenas status. Nota numérica + breakdown
            // ficam em artifact privado (acesso restrito ao prof Jackson).
            const body = [
              `## 🤖 J.A.R.V.I.S. — *autograder do Prof. Jackson*`,
              ``,
              `> *Just A Rather Very Intelligent System* — bot que executa as regras de avaliação automatizada do prof nos PRs de exercício.`,
              ``,
              `**Atividade 4 (Maestro Suite)**`,
              ``,
              `**Status:** ${passou ? '✅ Critérios mínimos automatizados atendidos' : '⚠️ Revisão manual necessária'}`,
              ``,
              `Avaliação automatizada parcial concluída. A **pontuação final**`,
              `será lançada por mim (Prof. Jackson) **no Canvas** após revisão manual.`,
              ``,
              `### 🎥 Anexe um vídeo (≤ 2min)`,
              ``,
              `Mostre \`maestro test flows/\` rodando no seu emulator/device.`,
              `Cole o vídeo (\`.mp4\`/\`.mov\`/\`.webm\`) ou link (Loom/YouTube unlisted) na descrição deste PR.`,
              ``,
              `_Pontuação final no Canvas._`,
              `_Dúvidas? **Teams da turma** ou jackson.96@gmail.com._`,
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Set status check based on score
        if: always()
        run: |
          if [ -f /tmp/grade.json ]; then
            PASS=$(cat /tmp/grade.json | grep -o '"pass":[^,]*' | head -1 | cut -d: -f2 | tr -d ' ')
            if [ "$PASS" = "true" ]; then
              echo "✅ Pass threshold atingido (parse-only)."
              exit 0
            else
              echo "⚠️  Score abaixo do mínimo. Revisão manual necessária."
              exit 1
            fi
          else
            echo "❌ grade.json não gerado."
            exit 1
          fi
