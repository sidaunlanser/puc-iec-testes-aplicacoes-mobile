name: Grade — Ativ. 3 Maestro E2E

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - 'exercicios/03-maestro-e2e/**'

permissions:
  pull-requests: write
  contents: read

jobs:
  grade:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 1. Checkout base (grader confiável do prof)
      - name: Checkout base
        uses: actions/checkout@v4

      # 2. Checkout head do PR em pasta isolada (entrega não-confiável — só leitura)
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: _pr

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: exercicios/03-maestro-e2e/grader/package-lock.json

      - name: Install grader deps
        run: npm install
        working-directory: exercicios/03-maestro-e2e/grader

      - name: Run validator
        id: grade
        run: |
          npx ts-node validator.ts --entrega ../../../_pr/exercicios/03-maestro-e2e
        working-directory: exercicios/03-maestro-e2e/grader

      - name: Upload grade artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: grade-pr${{ github.event.pull_request.number }}
          path: exercicios/03-maestro-e2e/grader/grade.json
          retention-days: 90

      - name: Comment on PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs')
            const gradePath = 'exercicios/03-maestro-e2e/grader/grade.json'

            let grade
            try {
              grade = JSON.parse(fs.readFileSync(gradePath, 'utf8'))
            } catch (e) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: '❌ **J.A.R.V.I.S.** — Erro ao ler resultado da avaliação. Verifique os logs do workflow.'
              })
              return
            }

            const { autoScore, maxAutoScore, breakdown } = grade

            const body = [
              '## 🤖 J.A.R.V.I.S. — Avaliação Atividade 3 (Maestro E2E)',
              '',
              `**Nota automática (piso): ${autoScore}/${maxAutoScore} pts**`,
              '',
              '> ⚠️ Esta é a nota **mínima garantida** — critérios com 📝 são avaliados manualmente pelo professor no Canvas.',
              '',
              '### Detalhamento',
              breakdown,
              '',
              '---',
              '_Fez um ajuste? Só commitar e dar push — o bot reavalia automaticamente._',
            ].join('\n')

            // Procura comentário anterior do bot para editar
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            })

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('J.A.R.V.I.S.')
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              })
            }
